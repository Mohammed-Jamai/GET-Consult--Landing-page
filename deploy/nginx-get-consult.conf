server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name get-consult.com www.get-consult.com;

    root /var/www/get-consult;
    index index.html;

    location /api/ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ~* \.(css|js|svg|jpg|jpeg|png|webp|woff|woff2|ico)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml text/plain;
    gzip_min_length 256;

    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
}

# IP-only access (optional, keeps http://5.189.157.30 working)
server {
    listen 80;
    listen [::]:80;
    server_name 5.189.157.30;

    root /var/www/get-consult;
    index index.html;

    location /api/ {
        include snippets/fastcgi-php.conf;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
